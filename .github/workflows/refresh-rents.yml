# Daily refresh of PSA per-facility unit rents.
#
# Runs at 06:00 UTC every day. Crawls all 24 PSA-disclosed MSAs (~250
# facilities), rebuilds the cross-validated rent index, and commits the
# updated JSON files back to the repo. The Vercel deployment auto-rebuilds
# on push, so the Asset Analyzer always reflects rents <= 24 hours old.
#
# Why GitHub Actions instead of Vercel Cron Jobs:
#   - Vercel Cron Jobs invoke a serverless function under 300s — too short
#     for our ~25 min crawl across 24 MSAs at 1 req/sec.
#   - The crawl produces JSON files that need to be COMMITTED back to the
#     repo so the static React app picks them up on the next build. Vercel
#     serverless functions have no git access.
#   - GitHub Actions runs on full Ubuntu, has 60-min default timeout,
#     and a built-in GITHUB_TOKEN with repo write access. Right tool.
#
# This is what makes Storvex's per-facility rent data refresh AS FAST as
# Radius+ — Radius+ does daily scraping; we do daily scraping with primary-
# source SEC EDGAR audit trail layered on top.

name: Refresh PSA Facility Rents

on:
  schedule:
    # Runs every day at 06:00 UTC (01:00 EST / 02:00 EDT) — quiet time
    # for Cloudflare WAF, before US business hours.
    - cron: "0 6 * * *"
  # Allow manual trigger from the Actions tab for ad-hoc refreshes
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Token with write access so we can push the refreshed JSON
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run PSA facility rent scraper (24 MSAs · ~25 min)
        run: node scripts/edgar/scrape-psa-facility-rents.mjs
        env:
          # No env required — public PSA pages, primary-source extraction
          NODE_ENV: production

      - name: Rebuild aggregator + cross-validation index
        run: node scripts/edgar/build-scraped-rent-index.mjs

      - name: Commit refreshed data
        run: |
          git config user.name "storvex-bot"
          git config user.email "noreply@storvex.com"
          # Add the freshly-generated files (date-stamped + canonical index)
          git add src/data/psa-facility-rents-*.json src/data/psa-scraped-rent-index.json
          # Only commit if there are actual changes (no-op on no-change days)
          if git diff --staged --quiet; then
            echo "No rent changes detected — skipping commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            # jq is pre-installed on ubuntu-latest; use it instead of node -e
            FACILITIES=$(jq -r '.totals.facilities' src/data/psa-scraped-rent-index.json)
            UNITS=$(jq -r '.totals.unitListings' src/data/psa-scraped-rent-index.json)
            git commit -m "chore(rents): daily refresh ${DATE} · ${FACILITIES} fac · ${UNITS} units"
            git push
          fi
